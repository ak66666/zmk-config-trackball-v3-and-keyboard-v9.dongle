# These are troubleshooting items
#CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
#CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

CONFIG_ZMK_POINTING=y
# CONFIG_ZMK_IDLE_TIMEOUT=30000


# Settings for PMW3610 driver from https://github.com/AntoineGS/zmk-pmw3610-driver 
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_MOUSE=y
#CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_PMW3610=y
CONFIG_PM_DEVICE=y
CONFIG_PMW3610_PM=y
CONFIG_PMW3610_ACCELERATION_ALGORITHM=2
# 0: disabled, 1: quadratic, 2: sigmoid
CONFIG_PMW3610_ACCELERATION_SENSITIVITY=5
 # 1-100
CONFIG_PMW3610_ORIENTATION_90=y
CONFIG_PMW3610_INVERT_Y=y

CONFIG_PMW3610_CPI=800
#Default 800 range 200..3200 with 200 step